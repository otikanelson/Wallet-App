# Gradle properties for TLS configuration
org.gradle.jvmargs=-Dhttps.protocols=TLSv1.2,TLSv1.3 -Djdk.tls.client.protocols=TLSv1.2,TLSv1.3 -Djavax.net.ssl.trustStore=NONE -Djavax.net.ssl.trustStoreType=Windows-ROOT

# Enable Gradle daemon for faster builds
org.gradle.daemon=true

# Configure parallel builds
org.gradle.parallel=true

# Use configuration cache
org.gradle.configuration-cache=true